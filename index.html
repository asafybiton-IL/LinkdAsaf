<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>פוסט מנג׳ר | אסף יעיש ביטון</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --surface: #17171e; --surface2: #1e1e28; --surface3: #25252f;
    --border: #2e2e3e; --accent: #6c63ff; --accent2: #ff6584; --accent3: #43e97b;
    --text: #e8e8f0; --text2: #9090a8; --text3: #5a5a72;
    --ready: #43e97b; --draft: #f7c948; --idea: #6c63ff; --published: #4fc3f7;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; direction:rtl; }
  .layout { display:flex; min-height:100vh; }

  /* SIDEBAR */
  .sidebar { width:260px; min-width:260px; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .sidebar-logo { padding:28px 24px 20px; border-bottom:1px solid var(--border); }
  .sidebar-logo h1 { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
  .sidebar-logo span { font-size:12px; color:var(--text3); display:block; margin-top:2px; }
  .sidebar-section { padding:20px 16px 8px; font-size:10px; font-weight:700; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; }
  .sidebar-btn { display:flex; align-items:center; gap:10px; padding:10px 16px; margin:2px 8px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:500; color:var(--text2); transition:all 0.15s; border:none; background:none; width:calc(100% - 16px); text-align:right; font-family:'Heebo',sans-serif; }
  .sidebar-btn:hover { background:var(--surface2); color:var(--text); }
  .sidebar-btn.active { background:var(--accent); color:#fff; }
  .sidebar-btn .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .count-badge { margin-right:auto; background:var(--surface3); color:var(--text3); font-size:11px; padding:2px 7px; border-radius:10px; font-weight:600; }
  .sidebar-btn.active .count-badge { background:rgba(255,255,255,0.2); color:#fff; }
  .tag-list { padding:4px 8px; }
  .tag-chip { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; margin:3px 4px; border-radius:20px; font-size:12px; font-weight:500; cursor:pointer; border:1.5px solid var(--border); color:var(--text2); background:none; transition:all 0.15s; font-family:'Heebo',sans-serif; }
  .tag-chip:hover, .tag-chip.active { border-color:var(--accent); color:var(--accent); background:rgba(108,99,255,0.08); }
  .sidebar-btn.drop-target { background:rgba(108,99,255,0.25) !important; border:2px dashed var(--accent) !important; color:#fff !important; transition:all 0.1s; }
  .tag-chip.drop-target { border-color:var(--accent3) !important; background:rgba(67,233,123,0.2) !important; color:var(--accent3) !important; transform:scale(1.08); transition:all 0.1s; }
  .new-post-btn { margin:16px; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Heebo',sans-serif; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .new-post-btn:hover { background:#5b52ee; transform:translateY(-1px); box-shadow:0 4px 20px rgba(108,99,255,0.4); }

  /* MAIN */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .topbar { padding:20px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; background:var(--surface); position:sticky; top:0; z-index:10; }
  .topbar h2 { font-size:20px; font-weight:800; flex:1; }
  .search-box { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 14px; width:260px; }
  .search-box input { background:none; border:none; outline:none; color:var(--text); font-size:14px; font-family:'Heebo',sans-serif; width:100%; direction:rtl; }
  .search-box input::placeholder { color:var(--text3); }
  .view-toggle { display:flex; gap:4px; }
  .view-btn { padding:8px 10px; border-radius:6px; border:1px solid var(--border); background:none; color:var(--text3); cursor:pointer; transition:all 0.15s; font-size:16px; }
  .view-btn.active { background:var(--surface2); color:var(--text); border-color:var(--accent); }
  .sort-select { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text2); padding:6px 10px; font-size:12px; font-family:'Heebo',sans-serif; outline:none; cursor:pointer; transition:border-color 0.15s; }
  .sort-select:hover, .sort-select:focus { border-color:var(--accent); color:var(--text); }

  /* STATS */
  .stats-bar { display:flex; gap:1px; background:var(--border); border-bottom:1px solid var(--border); }
  .stat-item { flex:1; padding:16px 20px; background:var(--surface); text-align:center; }
  .stat-item .num { font-size:28px; font-weight:900; line-height:1; }
  .stat-item .label { font-size:11px; color:var(--text3); margin-top:4px; font-weight:500; }

  /* POSTS */
  .posts-area { flex:1; padding:24px 28px; overflow-y:auto; }
  .posts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  .posts-list { display:flex; flex-direction:column; gap:10px; }
  .post-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
  .post-card::before { content:''; position:absolute; top:0; right:0; width:3px; height:100%; border-radius:0 14px 14px 0; }
  .post-card.status-ready::before { background:var(--ready); }
  .post-card.status-draft::before { background:var(--draft); }
  .post-card.status-idea::before { background:var(--idea); }
  .post-card.status-published::before { background:var(--published); }
  .post-card.status-deleted::before { background:var(--text3); }
  .post-card:hover { border-color:var(--accent); background:var(--surface2); transform:translateY(-2px); box-shadow:var(--shadow); }
  .post-card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; gap:8px; }
  .post-title { font-size:15px; font-weight:700; color:var(--text); line-height:1.4; flex:1; }
  .status-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; flex-shrink:0; }
  .badge-ready { background:rgba(67,233,123,0.12); color:var(--ready); }
  .badge-draft { background:rgba(247,201,72,0.12); color:var(--draft); }
  .badge-idea { background:rgba(108,99,255,0.12); color:var(--idea); }
  .badge-published { background:rgba(79,195,247,0.12); color:var(--published); }
  .badge-deleted { background:rgba(90,90,114,0.12); color:var(--text3); }
  .post-body { font-size:13px; color:var(--text2); line-height:1.6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:14px; }
  .post-visual { font-size:12px; color:var(--text3); background:var(--surface2); padding:6px 10px; border-radius:6px; margin-bottom:12px; }
  .post-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .post-tags { display:flex; gap:5px; flex-wrap:wrap; flex:1; }
  .post-tag { font-size:11px; padding:3px 8px; border-radius:4px; background:var(--surface3); color:var(--text3); font-weight:500; }
  .post-date { font-size:11px; color:var(--text3); flex-shrink:0; }
  .post-actions { display:flex; gap:4px; opacity:0; transition:opacity 0.15s; }
  .post-card:hover .post-actions { opacity:1; }
  .action-btn { padding:5px 8px; border-radius:6px; border:1px solid var(--border); background:var(--surface3); color:var(--text2); font-size:12px; cursor:pointer; transition:all 0.15s; font-family:'Heebo',sans-serif; }
  .action-btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
  .action-btn.danger:hover { background:var(--accent2); border-color:var(--accent2); }
  .restore-btn { padding:5px 10px; border-radius:6px; border:1px solid rgba(67,233,123,0.3); background:rgba(67,233,123,0.08); color:var(--ready); font-size:12px; cursor:pointer; font-family:'Heebo',sans-serif; transition:all 0.15s; }
  .restore-btn:hover { background:rgba(67,233,123,0.2); }
  .trash-timer { font-size:11px; color:var(--text3); }
  .post-card-list { display:flex; align-items:center; gap:16px; padding:14px 20px; }
  .post-card-list .post-title { font-size:14px; }
  .post-card-list .post-body { -webkit-line-clamp:1; margin-bottom:0; font-size:12px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; width:100%; max-width:700px; max-height:90vh; overflow-y:auto; padding:32px; transform:translateY(20px); transition:transform 0.2s; box-shadow:0 24px 80px rgba(0,0,0,0.6); }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
  .modal-title { font-size:20px; font-weight:800; }
  .modal-close { width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--text2); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .modal-close:hover { background:var(--surface2); color:var(--text); }
  .form-row { margin-bottom:20px; }
  .form-label { display:block; font-size:12px; font-weight:700; color:var(--text3); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:8px; }
  .form-input, .form-textarea, .form-select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 16px; color:var(--text); font-size:14px; font-family:'Heebo',sans-serif; outline:none; transition:border-color 0.15s; direction:rtl; }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color:var(--accent); }
  .form-textarea { min-height:140px; resize:vertical; line-height:1.7; }
  .form-select option { background:var(--surface2); }
  .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .tags-input-area { display:flex; flex-wrap:wrap; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; min-height:48px; align-items:center; cursor:text; }
  .tags-input-area:focus-within { border-color:var(--accent); }
  .tag-input-chip { display:inline-flex; align-items:center; gap:5px; background:var(--surface3); color:var(--text); padding:3px 10px; border-radius:6px; font-size:12px; font-weight:500; }
  .tag-input-chip button { background:none; border:none; color:var(--text3); cursor:pointer; font-size:14px; line-height:1; padding:0; }
  .tag-input-chip button:hover { color:var(--accent2); }
  .tags-input { background:none; border:none; outline:none; color:var(--text); font-size:13px; font-family:'Heebo',sans-serif; min-width:100px; flex:1; direction:rtl; }
  .modal-footer { display:flex; gap:10px; margin-top:28px; align-items:center; }
  .btn-primary { padding:12px 24px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Heebo',sans-serif; transition:all 0.15s; }
  .btn-primary:hover { background:#5b52ee; }
  .btn-secondary { padding:12px 24px; background:none; color:var(--text2); border:1px solid var(--border); border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Heebo',sans-serif; transition:all 0.15s; }
  .btn-secondary:hover { background:var(--surface2); color:var(--text); }
  .btn-copy { padding:12px 24px; background:rgba(67,233,123,0.1); color:var(--ready); border:1px solid rgba(67,233,123,0.2); border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Heebo',sans-serif; transition:all 0.15s; }
  .btn-copy:hover { background:rgba(67,233,123,0.2); }
  .char-counter { text-align:left; font-size:11px; color:var(--text3); margin-top:4px; }
  .char-counter.warn { color:var(--draft); }
  .char-counter.over { color:var(--accent2); }
  .autosave-indicator { font-size:11px; color:var(--text3); margin-right:auto; transition:color 0.3s; }
  .autosave-indicator.saving { color:var(--draft); }
  .autosave-indicator.saved { color:var(--ready); }


  /* SIDEBAR DROP TARGETS */
  .sidebar-btn.drop-target { background: rgba(108,99,255,0.2) !important; border: 2px dashed var(--accent) !important; color: var(--accent) !important; transform: scale(1.02); transition: all 0.15s; }
  .tag-chip.drop-target { border-color: var(--accent) !important; color: var(--accent) !important; background: rgba(108,99,255,0.2) !important; transform: scale(1.05); }
  .post-card[draggable="true"] { cursor: grab; }
  .post-card[draggable="true"]:active { cursor: grabbing; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--surface3); border:1px solid var(--border); color:var(--text); padding:12px 20px; border-radius:10px; font-size:14px; font-weight:500; z-index:500; transition:transform 0.3s; box-shadow:var(--shadow); }
  .toast.show { transform:translateX(-50%) translateY(0); }

  /* EMPTY */
  .empty-state { text-align:center; padding:80px 20px; color:var(--text3); }
  .empty-state .icon { font-size:48px; margin-bottom:16px; }
  .empty-state h3 { font-size:18px; font-weight:700; color:var(--text2); margin-bottom:8px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:3px; }

  /* TOPBAR EXTRAS */
  .sync-indicator { font-size:12px; color:var(--text3); }
  .devices-badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--text3); background:var(--surface2); border:1px solid var(--border); padding:5px 12px; border-radius:20px; cursor:pointer; transition:all 0.15s; }
  .devices-badge:hover { border-color:var(--accent); color:var(--accent); }
  .devices-modal { position:fixed; top:60px; left:20px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; min-width:280px; z-index:50; box-shadow:var(--shadow); display:none; }
  .devices-modal.open { display:block; }
  .devices-modal h4 { font-size:13px; font-weight:700; margin-bottom:12px; color:var(--text2); }
  .device-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; color:var(--text2); }
  .device-row:last-child { border-bottom:none; }
  .device-row .device-time { color:var(--text3); font-size:11px; }

  /* MULTI-WINDOW (desktop) */
  /* Tag picker button */
  .tag-picker-btn { background:none; border:1px solid var(--border); border-radius:6px; color:var(--text3); font-size:11px; padding:3px 8px; cursor:pointer; font-family:Heebo,sans-serif; transition:all 0.15s; }
  .tag-picker-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* Tag picker sheet */
  .tag-picker-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:298; display:none; }
  .tag-picker-overlay.open { display:block; }
  .tag-picker-sheet { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); border-radius:20px 20px 0 0; padding:16px 16px 32px; z-index:299; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); max-height:65vh; overflow-y:auto; }
  .tag-picker-sheet.open { transform:translateY(0); }

  /* Tag suggestions - global */
  .tag-suggestions { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .tag-suggest-chip { padding:5px 12px; border-radius:20px; background:var(--surface3); border:1px solid var(--border); color:var(--text3); font-size:12px; font-weight:500; cursor:pointer; font-family:'Heebo',sans-serif; transition:all 0.15s; }
  .tag-suggest-chip:hover { border-color:var(--accent); color:var(--accent); background:rgba(108,99,255,0.08); }
  .tag-suggest-chip.used { opacity:0.3; cursor:default; pointer-events:none; }

  @media (min-width:769px) {
    .compact-toggle { display:none !important; }
    .modal-overlay { display:none !important; }
    .windows-container { position:fixed; inset:0; pointer-events:none; z-index:100; }
    .post-window { position:absolute; width:480px; max-height:85vh; background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.6); display:flex; flex-direction:column; pointer-events:all; transition:box-shadow 0.15s; overflow:hidden; }
    .post-window.active { border-color:var(--accent); box-shadow:0 24px 80px rgba(108,99,255,0.3); z-index:110 !important; }
    .post-window-header { display:flex; align-items:center; gap:8px; padding:12px 16px; background:var(--surface2); border-bottom:1px solid var(--border); cursor:move; user-select:none; flex-shrink:0; }
    .post-window-title { flex:1; font-size:13px; font-weight:600; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .window-action-btn { width:24px; height:24px; border-radius:6px; border:none; background:var(--surface3); color:var(--text3); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
    .window-action-btn:hover { background:var(--accent2); color:#fff; }
    .window-action-btn.minimize:hover { background:var(--draft); color:#000; }
    .post-window-body { flex:1; overflow-y:auto; padding:20px; }
    .post-window.minimized .post-window-body, .post-window.minimized .post-window-footer { display:none; }
    .post-window.minimized { max-height:48px; }
    .post-window-footer { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-shrink:0; background:var(--surface); }
    .windows-taskbar { position:fixed; bottom:0; left:0; right:0; height:48px; background:var(--surface); border-top:1px solid var(--border); display:flex; align-items:center; gap:6px; padding:0 16px; z-index:90; overflow-x:auto; }
    .taskbar-tab { display:flex; align-items:center; gap:8px; padding:6px 14px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); font-size:12px; font-weight:600; color:var(--text2); cursor:pointer; white-space:nowrap; max-width:180px; overflow:hidden; text-overflow:ellipsis; transition:all 0.15s; flex-shrink:0; }
    .taskbar-tab:hover { border-color:var(--accent); color:var(--text); }
    .taskbar-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .taskbar-new-btn { padding:6px 14px; border-radius:8px; background:none; border:1px dashed var(--border); color:var(--text3); font-size:13px; font-weight:700; cursor:pointer; transition:all 0.15s; font-family:'Heebo',sans-serif; flex-shrink:0; }
    .taskbar-new-btn:hover { border-color:var(--accent); color:var(--accent); }
    .posts-area { padding-bottom:60px; }
    .mobile-tags-fab, .mobile-tags-drawer, .drawer-overlay { display:none !important; }
  }

  /* MOBILE */
  @media (max-width:768px) {
    /* Hide desktop-only */
    .windows-container, .windows-taskbar, .sidebar-section, .tag-list,
    .sort-select, .view-toggle, .devices-badge, .sync-indicator { display:none !important; }

    /* Layout */
    .layout { flex-direction:column; }
    .main { flex:1; min-height:0; }

    /* Sidebar → top bar */
    .sidebar { width:100%; min-width:unset; height:auto; position:relative; border-left:none; border-bottom:1px solid var(--border); flex-direction:column; }
    .sidebar-logo { padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between; border-bottom:none; }
    .sidebar-logo h1 { font-size:17px; }
    .sidebar-logo span { display:none; }

    /* New post button */
    .new-post-btn { margin:0 12px 10px; padding:11px 16px; font-size:14px; border-radius:10px; }

    /* Filter pills */
    .sidebar-filters { display:flex !important; overflow-x:auto; gap:6px; padding:6px 12px 10px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
    .sidebar-filters::-webkit-scrollbar { display:none; }
    .sidebar-btn { display:inline-flex !important; white-space:nowrap; flex-shrink:0; width:auto !important; margin:0 !important; padding:7px 12px; font-size:12px; border-radius:20px; }
    .sidebar-btn .dot { width:7px; height:7px; }
    .count-badge { font-size:10px; padding:1px 5px; }

    /* Topbar */
    .topbar { padding:10px 12px; gap:8px; border-bottom:1px solid var(--border); }
    .topbar h2 { display:none; }
    .search-box { flex:1; padding:7px 12px; }
    .compact-toggle { display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:none; color:var(--text3); font-size:16px; cursor:pointer; flex-shrink:0; }
    .compact-toggle.active { border-color:var(--accent); color:var(--accent); }
    .posts-grid.compact { grid-template-columns:1fr 1fr; gap:8px; }
    .posts-grid.compact .post-card { padding:12px; }

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbw-5d3Ow66B1XDpl_0guj9eOhL661rDVrLt5d-4TVQqOOeHnSwiGgrhfGiRO_yH_LR66w/exec';
let posts = [];
let currentFilter = 'all';
let currentView = 'grid';
let currentSearch = '';
let editingId = null;
let currentTags = [];
let filterTag = null;
let autosaveTimer = null;
let autosaveChanged = false;
let windows = {};
let windowZIndex = 110;
let windowCount = 0;
let dragging = null, dragOffX = 0, dragOffY = 0;

const statusLabels = { idea:'רעיון', draft:'דראפט', ready:'מוכן לפרסום', published:'פורסם', deleted:'נמחק' };
const statusEmoji = { idea:'💡', draft:'✏️', ready:'✅', published:'🚀', deleted:'🗑' };

// ========== AUTH ==========
function checkLogin() {
  const val = document.getElementById('login-input').value;
  const input = document.getElementById('login-input');
  const err = document.getElementById('login-error');
  if (val === '0868901990') {
    localStorage.setItem('ayb_auth', 'ayb_authenticated_2024');
    document.getElementById('login-overlay').style.display = 'none';
    err.textContent = '';
    logDeviceLogin();
    init().then(checkImport).then(() => {
    setTimeout(restoreDraftIfExists, 500);
    // Init sort selects
    const sort = localStorage.getItem('ayb_tag_sort') || 'alpha';
    ['sidebar-tag-sort','mobile-tag-sort','tag-sort-select'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = sort;
    });
  });
  } else {
    input.classList.add('error');
    err.textContent = 'סיסמה שגויה, נסה שוב';
    setTimeout(() => input.classList.remove('error'), 400);
    input.value = '';
  }
}

function checkAuth() {
  const stored = localStorage.getItem('ayb_auth');
  if (stored === 'ayb_authenticated_2024') {
    document.getElementById('login-overlay').style.display = 'none';
    logDeviceLogin();
    return true;
  }
  return false;
}

// ========== DEVICE TRACKING ==========
function getDeviceInfo() {
  const ua = navigator.userAgent;
  let icon = '💻', name = 'מחשב';
  if (/iPhone/.test(ua)) { icon = '📱'; name = 'iPhone'; }
  else if (/iPad/.test(ua)) { icon = '📱'; name = 'iPad'; }
  else if (/Android/.test(ua)) { icon = '📱'; name = 'Android'; }
  else if (/Mac/.test(ua)) { icon = '💻'; name = 'Mac'; }
  else if (/Windows/.test(ua)) { icon = '💻'; name = 'Windows'; }
  return { icon, name };
}

function logDeviceLogin() {
  const devices = JSON.parse(localStorage.getItem('ayb_devices') || '[]');
  const { icon, name } = getDeviceInfo();
  const filtered = devices.filter(d => d.name !== name);
  filtered.unshift({ icon, name, time: Date.now() });
  localStorage.setItem('ayb_devices', JSON.stringify(filtered.slice(0, 5)));
  updateDevicesBadge();
}

function updateDevicesBadge() {
  const devices = JSON.parse(localStorage.getItem('ayb_devices') || '[]');
  const badge = document.getElementById('devices-badge');
  const count = document.getElementById('devices-count');
  if (badge && devices.length > 0) { badge.style.display = 'inline-flex'; count.textContent = devices.length; }
}

function toggleDevices() {
  const modal = document.getElementById('devices-modal');
  const devices = JSON.parse(localStorage.getItem('ayb_devices') || '[]');
  const list = document.getElementById('devices-list');
  list.innerHTML = devices.map(d => {
    const date = new Date(d.time);
    const timeStr = date.toLocaleDateString('he-IL') + ' ' + date.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
    return `<div class="device-row"><span style="font-size:18px">${d.icon}</span><div style="flex:1"><div>${d.name}</div><div class="device-time">${timeStr}</div></div></div>`;
  }).join('');
  modal.classList.toggle('open');
}

document.addEventListener('click', (e) => {
  const modal = document.getElementById('devices-modal');
  const badge = document.getElementById('devices-badge');
  if (modal && badge && !modal.contains(e.target) && !badge.contains(e.target)) modal.classList.remove('open');
});

// ========== SYNC ==========
function setSyncing(val, msg) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  if (val) el.textContent = '🔄 מסנכרן...';
  else el.textContent = msg || '✅ מסונכרן';
}

async function init() {
  // Load from local cache immediately
  const cached = localStorage.getItem('ayb_posts_cache');
  if (cached) {
    try {
      posts = JSON.parse(cached);
      render();
      setSyncing(true);
    } catch(e) {}
  } else {
    setSyncing(true);
  }

  // Then sync with Sheets in background
  try {
    const res = await fetch(SHEET_URL + '?action=getPosts');
    const data = await res.json();
    const remote = (data.posts || []).map(p => {
      let tags = p.tags;
      if (!tags || tags === '') tags = [];
      else if (typeof tags === 'string') tags = tags.split(',').map(t => t.trim()).filter(Boolean);
      else if (!Array.isArray(tags)) tags = [];
      return { ...p, id: Number(p.id), created: Number(p.created), tags };
    });
    // Merge: remote wins for existing, keep local-only posts that aren't on remote yet
    const remoteIds = new Set(remote.map(p => p.id));
    const localOnly = posts.filter(p => !remoteIds.has(p.id));
    // Merge: if local version is newer (updated timestamp), prefer local
    const merged = remote.map(remotePost => {
      const localPost = posts.find(p => p.id === remotePost.id);
      if (localPost && (localPost.updated || 0) > (remotePost.updated || 0)) {
        return localPost; // local is newer — keep local (handles offline edits/deletes)
      }
      return remotePost;
    });
    posts = [...merged, ...localOnly];
    saveLocalCache();
    setSyncing(false, '✅ מסונכרן');
    render();
  } catch(e) {
    if (cached) {
      setSyncing(false, '📴 אופליין · מציג גרסה שמורה');
    } else {
      setSyncing(false, '⚠️ שגיאת חיבור');
      showToast('⚠️ לא ניתן להתחבר. בדוק חיבור.');
    }
  }
}

function saveLocalCache() {
  try { localStorage.setItem('ayb_posts_cache', JSON.stringify(posts)); } catch(e) {}
}

// Queue for offline saves
let offlineQueue = JSON.parse(localStorage.getItem('ayb_offline_queue') || '[]');

async function flushOfflineQueue() {
  if (!offlineQueue.length) return;
  const toFlush = [...offlineQueue];
  offlineQueue = [];
  localStorage.setItem('ayb_offline_queue', '[]');
  for (const item of toFlush) {
    try { await fetch(SHEET_URL, { method:'POST', body: JSON.stringify(item) }); }
    catch(e) { offlineQueue.push(item); }
  }
  localStorage.setItem('ayb_offline_queue', JSON.stringify(offlineQueue));
}

// Auto-sync when coming back online
window.addEventListener('online', () => {
  setSyncing(false, '✅ חזר אינטרנט');
  showToast('🌐 חזר אינטרנט — מסנכרן...');
  flushOfflineQueue().then(() => init());
});

window.addEventListener('offline', () => {
  setSyncing(false, '📴 אופליין');
  showToast('📴 אין אינטרנט — שומר מקומית');
});

// Polling fallback — every 30s check connectivity and flush queue
setInterval(async () => {
  if (!navigator.onLine) return;
  if (offlineQueue.length > 0) {
    await flushOfflineQueue();
    showToast('🔄 סונכרן ' + offlineQueue.length + ' שינויים');
  }
  // Also check if remote has newer data
  try {
    const res = await fetch(SHEET_URL + '?action=getPosts&t=' + Date.now());
    const data = await res.json();
    const remote = (data.posts || []).map(p => {
      let tags = p.tags;
      if (!tags || tags === '') tags = [];
      else if (typeof tags === 'string') tags = tags.split(',').map(t => t.trim()).filter(Boolean);
      else if (!Array.isArray(tags)) tags = [];
      return { ...p, id: Number(p.id), created: Number(p.created), tags };
    });
    const remoteIds = new Set(remote.map(p => p.id));
    const localOnly = posts.filter(p => !remoteIds.has(p.id));
    // Merge: if local version is newer (updated timestamp), prefer local
    const merged = remote.map(remotePost => {
      const localPost = posts.find(p => p.id === remotePost.id);
      if (localPost && (localPost.updated || 0) > (remotePost.updated || 0)) {
        return localPost; // local is newer — keep local (handles offline edits/deletes)
      }
      return remotePost;
    });
    posts = [...merged, ...localOnly];
    saveLocalCache();
    render();
    setSyncing(false, '✅ מסונכרן');
  } catch(e) {
    setSyncing(false, '📴 אופליין');
  }
}, 30000);

async function savePosts(post, action) {
  saveLocalCache(); // Always save locally first
  try {
    await fetch(SHEET_URL, { method:'POST', body: JSON.stringify({ action, ...post }) });
  } catch(e) {
    // Offline — queue for later
    offlineQueue.push({ action, ...post });
    localStorage.setItem('ayb_offline_queue', JSON.stringify(offlineQueue));
  }
}

// ========== IMPORT FROM URL ==========
async function checkImport() {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('import');
  if (!raw) return;
  try {
    const items = JSON.parse(decodeURIComponent(raw));
    if (!items || !items.length) return;
    let count = 0;
    for (const item of items) {
      const post = { id: Date.now() + count, created: Date.now() + count, title: item.title || '', body: item.body || '', visual: '', status: 'idea', tags: [], date: '' };
      posts.unshift(post);
      savePosts(post, 'savePost');
      count++;
      await new Promise(r => setTimeout(r, 300));
    }
    render();
    showToast('🎉 ' + count + ' פוסטים נוספו מקלוד!');
    window.history.replaceState({}, '', window.location.pathname);
  } catch(e) { showToast('⚠️ שגיאה בייבוא'); }
}

// ========== RENDER ==========
function render() {
  updateStats();
  updateSidebarTags();
  renderPosts();
  const tagCounts = {};
  posts.filter(p => p.status !== 'deleted').forEach(p => (p.tags||[]).forEach(t => { tagCounts[t] = (tagCounts[t]||0)+1; }));
  const count = Object.keys(tagCounts).length;
  const fab = document.getElementById('fab-count');
  if (fab) { fab.style.display = count > 0 ? 'flex' : 'none'; fab.textContent = count; }
}

function updateStats() {
  const counts = { idea:0, draft:0, ready:0, published:0, deleted:0 };
  posts.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });
  document.getElementById('stat-total').textContent = posts.filter(p => p.status !== 'deleted' && p.status !== 'published').length;
  document.getElementById('stat-ready').textContent = counts.ready;
  document.getElementById('stat-draft').textContent = counts.draft;
  document.getElementById('stat-idea').textContent = counts.idea;
  document.getElementById('stat-published').textContent = counts.published;
  document.getElementById('count-all').textContent = posts.filter(p => p.status !== 'deleted').length;
  document.getElementById('count-idea').textContent = counts.idea;
  document.getElementById('count-draft').textContent = counts.draft;
  document.getElementById('count-ready').textContent = counts.ready;
  document.getElementById('count-published').textContent = counts.published;
  document.getElementById('count-deleted').textContent = counts.deleted;
  // Auto-purge deleted after 48h
  const now = Date.now();
  posts = posts.filter(p => !(p.status === 'deleted' && p.deletedAt && (now - p.deletedAt) > 48 * 3600 * 1000));
}

function getTagSort() { return localStorage.getItem('ayb_tag_sort') || 'alpha'; }

function saveTagSort(val) {
  localStorage.setItem('ayb_tag_sort', val);
  ['sidebar-tag-sort','mobile-tag-sort','tag-sort-select'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = val;
  });
}

function getSortedTagList() {
  const count = {}, lastUsed = {};
  posts.filter(p => p.status !== 'deleted').forEach(p => {
    (p.tags||[]).forEach(t => {
      count[t] = (count[t]||0) + 1;
      lastUsed[t] = Math.max(lastUsed[t]||0, p.updated||p.created||0);
    });
  });
  let tags = Object.keys(count);
  const sort = getTagSort();
  if (sort === 'count') tags.sort((a,b) => count[b] - count[a]);
  else if (sort === 'recent') tags.sort((a,b) => (lastUsed[b]||0) - (lastUsed[a]||0));
  else tags.sort((a,b) => a.localeCompare(b, 'he'));
  return tags.map(t => ({ tag: t, count: count[t], lastUsed: lastUsed[t] }));
}

function updateSidebarTags() {
  const container = document.getElementById('sidebar-tags');
  const sortedTags = getSortedTagList();
  const sort = getTagSort();
  const sel = document.getElementById('sidebar-tag-sort');
  if (sel) sel.value = sort;
  container.innerHTML = '';
  const pinnedTags = JSON.parse(localStorage.getItem('ayb_pinned_tags')||'[]');
  // Sort: pinned first, then sorted
  const pinned = sortedTags.filter(({tag}) => pinnedTags.includes(tag));
  const unpinned = sortedTags.filter(({tag}) => !pinnedTags.includes(tag));
  const finalTags = [...pinned, ...unpinned];
  finalTags.forEach(({ tag }) => {
    const isPinned = pinnedTags.includes(tag);
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:2px;';
    const chip = document.createElement('button');
    chip.className = 'tag-chip' + (filterTag === tag ? ' active' : '');
    chip.textContent = (isPinned ? '📌 ' : '') + tag;
    chip.onclick = () => filterByTag(filterTag === tag ? null : tag);
    chip.addEventListener('dragover', (e) => { e.preventDefault(); chip.classList.add('drop-target'); });
    chip.addEventListener('dragleave', () => chip.classList.remove('drop-target'));
    chip.addEventListener('drop', (e) => { e.preventDefault(); chip.classList.remove('drop-target'); dropToTag(tag); });
    const pinBtn = document.createElement('button');
    pinBtn.style.cssText = 'background:none;border:none;cursor:pointer;opacity:0.4;font-size:11px;padding:2px;color:var(--text3);';
    pinBtn.textContent = isPinned ? '×' : '📌';
    pinBtn.title = isPinned ? 'הסר נעיצה' : 'נעץ תגית';
    pinBtn.onclick = (e) => { e.stopPropagation(); togglePinTag(tag); };
    wrap.appendChild(chip);
    wrap.appendChild(pinBtn);
    container.appendChild(wrap);
  });
}

function searchMatch(post, query) {
  if (!query) return true;
  const q = query.toLowerCase().trim();
  const fields = [post.title||'', post.body||'', post.visual||'', ...(post.tags||[])];
  if (fields.some(f => f.toLowerCase().includes(q))) return true;
  if (q.length > 3) {
    return fields.some(f => {
      const words = f.toLowerCase().split(' ');
      return words.some(w => levDist(w, q) <= 1);
    });
  }
  return false;
}

function levDist(a, b) {
  if (Math.abs(a.length - b.length) > 2) return 99;
  const m = a.length, n = b.length;
  const dp = [];
  for (let i = 0; i <= m; i++) { dp[i] = [i]; for (let j = 1; j <= n; j++) dp[i][j] = 0; }
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function renderPosts() {
  let filtered = posts.filter(p => {
    const matchStatus = currentFilter === 'all' ? p.status !== 'deleted' : p.status === currentFilter;
    const matchTag = !filterTag || (p.tags||[]).includes(filterTag);
    const matchSearch = !currentSearch || searchMatch(p, currentSearch);
    const matchFav = !showFavOnly || (p.tags||[]).includes('⭐');
    return matchStatus && matchTag && matchSearch && matchFav;
  });
  const sortVal = window.currentSort || 'created_desc';
  const statusOrder = { idea:0, draft:1, ready:2, published:3, deleted:4 };
  filtered.sort((a,b) => {
    switch(sortVal) {
      case 'created_asc': return a.created - b.created;
      case 'updated_desc': return (b.updated||b.created) - (a.updated||a.created);
      case 'status': return (statusOrder[a.status]??5) - (statusOrder[b.status]??5);
      case 'length_desc': return (b.body||'').length - (a.body||'').length;
      case 'length_asc': return (a.body||'').length - (b.body||'').length;
      case 'tag': return (a.tags?.[0]||'ת').localeCompare(b.tags?.[0]||'ת','he');
      default: return b.created - a.created;
    }
  });
  const container = document.getElementById('posts-container');
  container.className = currentView === 'grid' ? 'posts-grid' : 'posts-list';
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">📭</div><h3>אין פוסטים כאן עדיין</h3><p>לחץ על "פוסט חדש" כדי להתחיל</p></div>`;
    return;
  }
  container.innerHTML = '';
  applyCompactView();
  filtered.forEach(post => {
    const div = document.createElement('div');
    div.innerHTML = renderCard(post);
    const card = div.firstElementChild;
    if (isDesktop()) {
      card.setAttribute('draggable', 'true');
      card.dataset.postId = post.id;
      card.addEventListener('dragstart', onCardDragStart);
      card.addEventListener('dragover', onCardDragOver);
      card.addEventListener('dragleave', onCardDragLeave);
      card.addEventListener('drop', onCardDrop);
      card.addEventListener('dragend', onCardDragEnd);
    }
    container.appendChild(card);
  });
}

// ========== CARD DRAG & DROP ==========
let dragSrcId = null;

function onCardDragStart(e) {
  dragSrcId = parseInt(this.dataset.postId);
  this.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}
function onCardDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  this.style.borderColor = 'var(--accent)';
  this.style.background = 'var(--surface2)';
}
function onCardDragLeave() {
  this.style.borderColor = '';
  this.style.background = '';
}
function onCardDrop(e) {
  e.stopPropagation();
  const targetId = parseInt(this.dataset.postId);
  if (dragSrcId === targetId) return;
  const srcIdx = posts.findIndex(p => p.id === dragSrcId);
  const tgtIdx = posts.findIndex(p => p.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;
  const [moved] = posts.splice(srcIdx, 1);
  posts.splice(tgtIdx, 0, moved);
  this.style.borderColor = '';
  this.style.background = '';
  renderPosts();
  showToast('✅ סדר עודכן');
}
function onCardDragEnd() {
  this.style.opacity = '';
  this.style.borderColor = '';
  this.style.background = '';
}

function renderCard(post) {
  const badge = `<span class="status-badge badge-${post.status}">${statusEmoji[post.status]||''} ${statusLabels[post.status]||''}</span>`;
  const tags = (post.tags||[]).map(t => `<span class="post-tag">${t}</span>`).join('');
  const dateStr = post.date ? `📅 ${post.date}` : '';
  const visualHtml = post.visual ? `<div class="post-visual">🎨 ${post.visual}</div>` : '';
  const isFav = (post.tags||[]).includes('⭐');
  let actions = `<button class="action-btn${isFav?' fav-active':''}" onclick="event.stopPropagation();toggleFavorite(${post.id})" title="מועדף">⭐</button><button class="action-btn" onclick="event.stopPropagation();copyText(${post.id})">📋</button><button class="action-btn" onclick="event.stopPropagation();duplicatePost(${post.id},null)" title="שכפל">⧉</button>`;
  if (post.status === 'deleted') {
    const hoursLeft = post.deletedAt ? Math.max(0, Math.ceil((48*3600*1000 - (Date.now() - post.deletedAt)) / 3600000)) : 48;
    actions = `<span class="trash-timer">${hoursLeft}ש׳</span><button class="restore-btn" onclick="event.stopPropagation();restorePost(${post.id})">♻️ שחזר</button>`;
  } else {
    actions += `<button class="action-btn danger" onclick="event.stopPropagation();deletePost(${post.id})">🗑</button>`;
  }
  if (currentView === 'list') {
    return `<div class="post-card post-card-list status-${post.status}" onclick="editPost(${post.id})"><div style="flex:1;min-width:0"><div class="post-title">${post.title||'ללא כותרת'}</div><div class="post-body">${post.body||''}</div></div>${badge}<div class="post-date">${dateStr}</div><div class="post-actions" style="opacity:1">${actions}</div></div>`;
  }
  return `<div class="post-card status-${post.status}" onclick="editPost(${post.id})"><div class="post-card-header"><div class="post-title">${post.title||'ללא כותרת'}</div>${badge}</div><div class="post-body">${post.body||'אין תוכן עדיין...'}</div>${visualHtml}<div class="post-footer"><div class="post-tags">${tags}</div><div class="post-date">${dateStr}</div><div class="post-actions">${actions}</div></div></div>`;
}

// ========== MODAL (mobile) ==========
function isDesktop() { return window.innerWidth > 768; }
function isMobileDevice() { return window.innerWidth <= 768; }

let isCompactView = localStorage.getItem('ayb_compact') === '1';
function toggleCompactView() {
  isCompactView = !isCompactView;
  localStorage.setItem('ayb_compact', isCompactView ? '1' : '0');
  applyCompactView();
}
function applyCompactView() {
  const btn = document.getElementById('compact-toggle-btn');
  const grid = document.getElementById('posts-container');
  if (btn) btn.classList.toggle('active', isCompactView);
  if (grid && isMobileDevice()) grid.classList.toggle('compact', isCompactView);
}

function openModal(post = null, contextStatus = null, contextTag = null) {
  if (isDesktop()) { openWindow(post, contextStatus, contextTag); return; }
  const inheritStatus = contextStatus || (post ? null : (currentFilter !== 'all' && currentFilter !== 'deleted' ? currentFilter : null));
  const inheritTag = contextTag || (post ? null : filterTag);
  editingId = post ? post.id : null;
  currentTags = post ? [...(post.tags||[])] : (inheritTag ? [inheritTag] : []);
  document.getElementById('modal-title').textContent = post ? 'עריכת פוסט' : 'פוסט חדש';
  document.getElementById('field-title').value = post ? (post.title||'') : '';
  document.getElementById('field-body').value = post ? (post.body||'') : '';
  document.getElementById('field-visual').value = post ? (post.visual||'') : '';
  document.getElementById('field-status').value = post ? post.status : (inheritStatus || 'idea');
  document.getElementById('field-date').value = post ? (post.date||'') : '';
  document.getElementById('copy-btn').style.display = post ? 'block' : 'none';
  renderTagChips();
  updateCharCount(document.getElementById('field-body'));
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => {
    const scroll = document.querySelector('.modal-body-scroll');
    if (scroll) scroll.scrollTop = 0;
    onTagInput('', 'modal');
  }, 150);
  startAutosave();
}

function closeModal() {
  stopAutosave();
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  editingId = null;
  currentTags = [];
}

function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }
function editPost(id) { const post = posts.find(p => p.id === id); if (post) openModal(post); }

function savePost() {
  const title = document.getElementById('field-title').value.trim();
  const body = document.getElementById('field-body').value.trim();
  const visual = document.getElementById('field-visual').value.trim();
  const status = document.getElementById('field-status').value;
  const date = document.getElementById('field-date').value;
  if (!title && !body) { showToast('⚠️ הוסף כותרת או תוכן'); return; }
  let postData;
  if (editingId) {
    const idx = posts.findIndex(p => p.id === editingId);
    postData = { ...posts[idx], title, body, visual, status, date, tags: currentTags, updated: Date.now() };
    if (idx !== -1) posts[idx] = postData;
    showToast('✅ הפוסט עודכן!');
  } else {
    postData = { id: Date.now(), title, body, visual, status, date, tags: currentTags, created: Date.now() };
    posts.unshift(postData);
    showToast('🎉 פוסט נוסף!');
  }
  closeModal();
  clearDraftCache();
  render();
  savePosts(postData, 'savePost');
}

function deletePost(id) {
  if (!confirm('להעביר לסל המחזור? יימחק סופית תוך 48 שעות.')) return;
  const idx = posts.findIndex(p => p.id === id);
  if (idx !== -1) { posts[idx].status = 'deleted'; posts[idx].deletedAt = Date.now(); savePosts(posts[idx], 'savePost'); }
  render();
  showToast('🗑 הועבר לסל המחזור');
}

function restorePost(id) {
  const idx = posts.findIndex(p => p.id === id);
  if (idx !== -1) { posts[idx].status = 'idea'; delete posts[idx].deletedAt; savePosts(posts[idx], 'savePost'); }
  render();
  showToast('♻️ הפוסט שוחזר');
}

// ========== AUTOSAVE (mobile) ==========
function startAutosave() {
  if (autosaveTimer) clearInterval(autosaveTimer);
  autosaveChanged = false;

  // Save draft to cache on every keystroke (survives app close)
  ['field-title','field-body','field-visual'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => {
      autosaveChanged = true;
      saveDraftToCache();
    });
  });

  autosaveTimer = setInterval(async () => {
    if (!autosaveChanged) return;
    const title = document.getElementById('field-title').value.trim();
    const body = document.getElementById('field-body').value.trim();
    if (!title && !body) return;
    setAutosaveStatus('saving'); autosaveChanged = false;
    const postData = { id: editingId || Date.now(), title, body, visual: document.getElementById('field-visual').value.trim(), status: document.getElementById('field-status').value, date: document.getElementById('field-date').value, tags: currentTags, created: editingId ? (posts.find(p=>p.id===editingId)?.created||Date.now()) : Date.now() };
    if (!editingId) { editingId = postData.id; posts.unshift(postData); }
    else { const idx = posts.findIndex(p=>p.id===editingId); if (idx!==-1) posts[idx] = postData; }
    savePosts(postData, 'savePost');
    setAutosaveStatus('saved'); render();
  }, 30000);
}

function saveDraftToCache() {
  const title = document.getElementById('field-title')?.value || '';
  const body = document.getElementById('field-body')?.value || '';
  const visual = document.getElementById('field-visual')?.value || '';
  const status = document.getElementById('field-status')?.value || 'idea';
  const date = document.getElementById('field-date')?.value || '';
  if (!title && !body) return;
  const draft = { id: editingId || '__draft__', title, body, visual, status, date, tags: currentTags, created: editingId ? (posts.find(p=>p.id===editingId)?.created||Date.now()) : Date.now(), isDraft: true };
  localStorage.setItem('ayb_open_draft', JSON.stringify(draft));
}

function clearDraftCache() {
  localStorage.removeItem('ayb_open_draft');
}

function restoreDraftIfExists() {
  const raw = localStorage.getItem('ayb_open_draft');
  if (!raw) return;
  try {
    const draft = JSON.parse(raw);
    if (!draft.title && !draft.body) return;
    // Check if it was already saved as a real post
    if (draft.id !== '__draft__' && posts.find(p => p.id === draft.id)) {
      clearDraftCache(); return;
    }
    showToast('📝 נמצא טיוטה שלא נשמרה — שוחזרה!');
    openModal({ ...draft, id: draft.id === '__draft__' ? null : draft.id });
  } catch(e) { clearDraftCache(); }
}

function stopAutosave() { if (autosaveTimer) { clearInterval(autosaveTimer); autosaveTimer = null; } setAutosaveStatus(''); }

function setAutosaveStatus(status) {
  const el = document.getElementById('autosave-indicator');
  if (!el) return;
  if (status === 'saving') { el.textContent = '💾 שומר...'; el.className = 'autosave-indicator saving'; }
  else if (status === 'saved') { el.textContent = '✓ נשמר'; el.className = 'autosave-indicator saved'; setTimeout(() => { el.textContent = ''; el.className = 'autosave-indicator'; }, 3000); }
  else { el.textContent = ''; el.className = 'autosave-indicator'; }
}

// ========== TAGS ==========
function handleTagInput(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(',','');
    if (val && !currentTags.includes(val)) { currentTags.push(val); renderTagChips(); }
    e.target.value = '';
  }
}

function renderTagChips() {
  const area = document.getElementById('tags-input-area');
  const input = document.getElementById('tag-input');
  area.innerHTML = '';
  currentTags.forEach((tag,i) => {
    const chip = document.createElement('span');
    chip.className = 'tag-input-chip';
    chip.innerHTML = `${tag}<button onclick="removeTag(${i})">×</button>`;
    area.appendChild(chip);
  });
  area.appendChild(input);
}

function removeTag(i) { currentTags.splice(i,1); renderTagChips(); }

// ========== FILTERS ==========
function filterStatus(status, btn) {
  currentFilter = status; filterTag = null;
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  const titles = { all:'כל הפוסטים', idea:'רעיונות', draft:'דראפטים', ready:'מוכנים לפרסום', published:'פורסמו', deleted:'נמחקו לאחרונה' };
  document.getElementById('section-title').textContent = titles[status];
  renderPosts(); updateSidebarTags();
}

function filterByTag(tag) { filterTag = tag; updateSidebarTags(); renderPosts(); }

function togglePinTag(tag) {
  let pinned = JSON.parse(localStorage.getItem('ayb_pinned_tags')||'[]');
  if (pinned.includes(tag)) pinned = pinned.filter(t => t !== tag);
  else pinned.push(tag);
  localStorage.setItem('ayb_pinned_tags', JSON.stringify(pinned));
  updateSidebarTags();
}
function searchPosts(val) { currentSearch = val; renderPosts(); }
function setView(view, btn) { currentView = view; document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderPosts(); }
function setSort(val) { window.currentSort = val; renderPosts(); }
function copyText(id) { const post = posts.find(p => p.id === id); if (post) navigator.clipboard.writeText(post.body||'').then(() => showToast('📋 הועתק!')); }
function copyPostText() { navigator.clipboard.writeText(document.getElementById('field-body').value).then(() => showToast('📋 הועתק!')); }
function updateCharCount(el) { const len = el.value.length; const c = document.getElementById('char-counter'); if(c){c.textContent=len+' / 3000 תווים'; c.className='char-counter'+(len>3000?' over':len>2500?' warn':'');} }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ========== MOBILE TAGS DRAWER ==========
function openTagsDrawer() {
  document.getElementById('tags-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  renderMobileTagsDrawer();
}

function renderMobileTagsDrawer() {
  const container = document.getElementById('drawer-tags-list');
  if (!container) return;
  const sort = getTagSort();
  const sel = document.getElementById('mobile-tag-sort');
  if (sel) sel.value = sort;
  const pinnedTags = JSON.parse(localStorage.getItem('ayb_pinned_tags')||'[]');
  const allTags = getSortedTagList();
  // Pinned first
  const pinned = allTags.filter(({tag}) => pinnedTags.includes(tag));
  const unpinned = allTags.filter(({tag}) => !pinnedTags.includes(tag));
  const sortedTags = [...pinned, ...unpinned];
  if (sortedTags.length === 0) { container.innerHTML = '<p style="color:var(--text3);font-size:13px">אין תגיות עדיין</p>'; return; }
  container.innerHTML = `<button class="drawer-tag-btn ${!filterTag?'active':''}" onclick="filterByTagMobile(null,this)">📁 הכל</button>` +
    sortedTags.map(({tag,count}) => {
      const isPinned = pinnedTags.includes(tag);
      return `<button class="drawer-tag-btn ${filterTag===tag?'active':''}" onclick="filterByTagMobile('${tag}',this)">${isPinned?'📌 ':''}#${tag} <span style="opacity:0.7;font-size:11px">${count}</span></button>`;
    }).join('');
}

function closeTagsDrawer() { document.getElementById('tags-drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }
function filterByTagMobile(tag, btn) { window.activeTagFilter = tag; filterByTag(tag); closeTagsDrawer(); }

// ========== MULTI-WINDOW (desktop) ==========
function openWindow(post = null, contextStatus = null, contextTag = null) {
  if (!isDesktop()) { openModal(post, contextStatus, contextTag); return; }
  const inheritStatus = contextStatus || (post ? null : (currentFilter !== 'all' && currentFilter !== 'deleted' ? currentFilter : 'idea'));
  const inheritTag = contextTag || (post ? null : filterTag);
  const winId = 'win_' + (++windowCount);
  const win = document.createElement('div');
  win.className = 'post-window active';
  win.id = winId;
  win.style.zIndex = ++windowZIndex;
  const offset = (windowCount % 6) * 30;
  win.style.top = (80 + offset) + 'px';
  win.style.right = (20 + offset) + 'px';
  const title = post ? (post.title||'ללא כותרת') : 'פוסט חדש';
  const initStatus = post ? post.status : (inheritStatus || 'idea');
  const initTags = post ? (post.tags||[]) : (inheritTag ? [inheritTag] : []);
  win.innerHTML = `
    <div class="post-window-header" onmousedown="startDrag(event,'${winId}')">
      <span class="post-window-title" id="wtitle_${winId}">${title}</span>
      <button class="window-action-btn minimize" onclick="toggleMinimize('${winId}')" title="מזער">─</button>
      <button class="window-action-btn" onclick="closeWindow('${winId}')" title="סגור">×</button>
    </div>
    <div class="post-window-body">
      <div class="form-row"><label class="form-label">נושא / כותרת</label><input type="text" class="form-input" id="wf_title_${winId}" placeholder="מה הנושא?" value="${post?(post.title||''):''}" oninput="updateWindowTitle('${winId}',this.value);markWindowChanged('${winId}')" /></div>
      <div class="form-row"><label class="form-label">גוף הפוסט</label><textarea class="form-textarea" id="wf_body_${winId}" style="min-height:160px" oninput="updateCharCountWindow('${winId}');markWindowChanged('${winId}')">${post?(post.body||''):''}</textarea><div class="char-counter" id="wchar_${winId}">0 / 3000 תווים</div></div>
      <div class="form-row"><label class="form-label">הצעה לויז׳ואל</label><input type="text" class="form-input" id="wf_visual_${winId}" placeholder="תאר את הויז'ואל..." value="${post?(post.visual||''):''}" oninput="markWindowChanged('${winId}')" /></div>
      <div class="form-row-2">
        <div class="form-row" style="margin-bottom:0"><label class="form-label">סטטוס</label><select class="form-select" id="wf_status_${winId}" onchange="markWindowChanged('${winId}')">
          <option value="idea" ${initStatus==='idea'?'selected':''}>💡 רעיון</option>
          <option value="draft" ${initStatus==='draft'?'selected':''}>✏️ דראפט</option>
          <option value="ready" ${initStatus==='ready'?'selected':''}>✅ מוכן לפרסום</option>
          <option value="published" ${initStatus==='published'?'selected':''}>🚀 פורסם</option>
        </select></div>
        <div class="form-row" style="margin-bottom:0"><label class="form-label">תאריך</label><input type="date" class="form-input" id="wf_date_${winId}" value="${post?(post.date||''):''}" onchange="markWindowChanged('${winId}')" /></div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <label class="form-label" style="display:flex;align-items:center;justify-content:space-between;">
          תגיות
          <button class="tag-picker-btn" onclick="openTagPicker('${winId}')" type="button">＋ בחר תגית</button>
        </label>
        <div class="tags-input-area window-tags-area" id="wf_tags_area_${winId}" onclick="document.getElementById('wf_tag_input_${winId}').focus()">
          <input type="text" class="tags-input" id="wf_tag_input_${winId}" placeholder="הוסף תגית + Enter..." onkeydown="handleWindowTagInput(event,'${winId}')" oninput="onTagInput(this.value,'${winId}')" onfocus="setTimeout(()=>onTagInput('','${winId}'),50)" />
        </div>
        <div id="tag-suggestions-${winId}" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;"></div>
      </div>
    </div>
    <div class="post-window-footer">
      <span class="autosave-indicator" id="wasave_${winId}"></span>
      <button class="btn-copy" onclick="copyWindowText('${winId}')" title="העתק טקסט">📋</button>
      <button class="btn-copy" onclick="duplicatePost(${post?post.id:'null'}, '${winId}')" title="שכפל פוסט" style="background:rgba(108,99,255,0.1);color:var(--accent);border-color:rgba(108,99,255,0.3)">⧉ שכפל</button>
      <button class="btn-primary" style="flex:1" onclick="saveWindow('${winId}',${post?post.id:'null'},${post?post.created:'null'})">שמור</button>
    </div>`;
  document.getElementById('windows-container').appendChild(win);
  activateWindow(winId);
  addTaskbarTab(winId, title);
  // Show context hint if inherited
  if (!post && (inheritStatus || inheritTag)) {
    const hints = [];
    if (inheritStatus && inheritStatus !== 'idea') hints.push(statusEmoji[inheritStatus] + ' ' + statusLabels[inheritStatus]);
    if (inheritTag) hints.push('🏷️ ' + inheritTag);
    if (hints.length) showToast('פוסט חדש: ' + hints.join(' · '));
  }
  setTimeout(() => updateCharCountWindow(winId), 50);
  windows[winId] = { id: post ? post.id : null, created: post ? post.created : null, changed: false, autosaveTimer: null, tagsList: [...initTags] };
  startWindowAutosave(winId, post ? post.id : null, post ? post.created : null);
  // Render initial tags + suggestions
  setTimeout(() => {
    renderWindowTags(winId);
    onTagInput('', winId);
  }, 200);
}

function activateWindow(winId) {
  Object.keys(windows).forEach(id => {
    const w = document.getElementById(id); if (w) w.classList.remove('active');
    const tab = document.getElementById('tab_'+id); if (tab) tab.classList.remove('active');
  });
  const win = document.getElementById(winId); if (win) { win.classList.add('active'); win.style.zIndex = ++windowZIndex; }
  const tab = document.getElementById('tab_'+winId); if (tab) tab.classList.add('active');
}

function closeWindow(winId) {
  const win = document.getElementById(winId); if (win) win.remove();
  const tab = document.getElementById('tab_'+winId); if (tab) tab.remove();
  if (windows[winId]?.autosaveTimer) clearInterval(windows[winId].autosaveTimer);
  delete windows[winId];
}

function toggleMinimize(winId) { const win = document.getElementById(winId); if (win) win.classList.toggle('minimized'); }

function updateWindowTitle(winId, val) {
  const tab = document.getElementById('tab_'+winId);
  const header = document.getElementById('wtitle_'+winId);
  const short = val.substring(0,20) || 'פוסט חדש';
  if (tab) tab.querySelector('span').textContent = short;
  if (header) header.textContent = short;
}

function updateCharCountWindow(winId) {
  const body = document.getElementById('wf_body_'+winId);
  const counter = document.getElementById('wchar_'+winId);
  if (!body || !counter) return;
  const len = body.value.length;
  counter.textContent = len + ' / 3000 תווים';
  counter.className = 'char-counter' + (len>3000?' over':len>2500?' warn':'');
}

function markWindowChanged(winId) { if (windows[winId]) windows[winId].changed = true; }
function copyWindowText(winId) { const body = document.getElementById('wf_body_'+winId); if (body) navigator.clipboard.writeText(body.value).then(() => showToast('📋 הועתק!')); }

function saveWindow(winId, existingId, existingCreated) {
  const title = document.getElementById('wf_title_'+winId)?.value.trim()||'';
  const body = document.getElementById('wf_body_'+winId)?.value.trim()||'';
  const visual = document.getElementById('wf_visual_'+winId)?.value.trim()||'';
  const status = document.getElementById('wf_status_'+winId)?.value||'idea';
  const date = document.getElementById('wf_date_'+winId)?.value||'';
  if (!title && !body) { showToast('⚠️ הוסף כותרת או תוכן'); return; }
  const postId = existingId || windows[winId]?.id || Date.now();
  const created = existingCreated || windows[winId]?.created || Date.now();
  const tags = windows[winId]?.tagsList || [];
  const postData = { id:postId, created, title, body, visual, status, tags, date, updated:Date.now() };
  const idx = posts.findIndex(p => p.id === postId);
  if (idx !== -1) posts[idx] = postData; else posts.unshift(postData);
  if (windows[winId]) { windows[winId].id = postId; windows[winId].created = created; windows[winId].changed = false; }
  render();
  const indicator = document.getElementById('wasave_'+winId);
  if (indicator) { indicator.textContent = '✅ נשמר'; indicator.className = 'autosave-indicator saved'; setTimeout(() => { indicator.textContent = ''; }, 2000); }
  showToast('✅ נשמר!');
  updateWindowTitle(winId, title);
  savePosts(postData, 'savePost');
}

function startWindowAutosave(winId, existingId, existingCreated) {
  const timer = setInterval(() => {
    if (!windows[winId] || !windows[winId].changed) return;
    windows[winId].changed = false;
    saveWindow(winId, existingId, existingCreated);
  }, 30000);
  if (windows[winId]) windows[winId].autosaveTimer = timer;
}

function addTaskbarTab(winId, title) {
  const taskbar = document.getElementById('windows-taskbar');
  const tab = document.createElement('div');
  tab.className = 'taskbar-tab active';
  tab.id = 'tab_'+winId;
  tab.innerHTML = `<span>${title.substring(0,20)||'פוסט חדש'}</span>`;
  tab.onclick = () => {
    const win = document.getElementById(winId);
    if (win && win.classList.contains('minimized')) win.classList.remove('minimized');
    activateWindow(winId);
  };
  taskbar.insertBefore(tab, taskbar.querySelector('.taskbar-new-btn'));
}

// ========== DRAG ==========
function startDrag(e, winId) {
  activateWindow(winId); dragging = winId;
  const win = document.getElementById(winId);
  const rect = win.getBoundingClientRect();
  dragOffX = e.clientX - rect.left; dragOffY = e.clientY - rect.top;
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', stopDrag);
}

function onDrag(e) {
  if (!dragging) return;
  const win = document.getElementById(dragging); if (!win) return;
  const x = window.innerWidth - e.clientX + dragOffX - win.offsetWidth;
  const y = e.clientY - dragOffY;
  win.style.right = Math.max(0,x)+'px'; win.style.top = Math.max(0,y)+'px';
}

function stopDrag() { dragging = null; document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag); }

// ========== SIDEBAR DRAG & DROP ==========
function sidebarDragOver(e, status) {
  e.preventDefault();
  e.currentTarget.classList.add('drop-target');
}
function sidebarDragLeave(e) {
  e.currentTarget.classList.remove('drop-target');
}
function sidebarDrop(e, status) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  if (!dragSrcId) return;
  const idx = posts.findIndex(p => p.id === dragSrcId);
  if (idx === -1) return;
  const oldStatus = posts[idx].status;
  if (oldStatus === status) return;
  posts[idx].status = status;
  if (status === 'deleted') posts[idx].deletedAt = Date.now();
  else delete posts[idx].deletedAt;
  posts[idx].updated = Date.now();
  savePosts(posts[idx], 'savePost');
  render();
  showToast(statusEmoji[status] + ' הועבר ל' + statusLabels[status]);
}
function dropToTag(tag) {
  if (!dragSrcId) return;
  const idx = posts.findIndex(p => p.id === dragSrcId);
  if (idx === -1) return;
  if (!(posts[idx].tags || []).includes(tag)) {
    posts[idx].tags = [...(posts[idx].tags || []), tag];
    posts[idx].updated = Date.now();
    savePosts(posts[idx], 'savePost');
    render();
    showToast('🏷️ תגית "' + tag + '" נוספה');
  } else {
    showToast('🏷️ התגית כבר קיימת');
  }
}

// ========== TAG PICKER SHEET ==========
let tagPickerContext = null;
let tagSortPref = localStorage.getItem('ayb_tag_sort') || 'alpha';

function openTagPicker(context) {
  tagPickerContext = context;
  const sel = document.getElementById('tag-sort-select');
  if (sel) sel.value = tagSortPref;
  document.getElementById('tag-picker-search').value = '';
  document.getElementById('tag-picker-new').value = '';
  renderTagPicker();
  document.getElementById('tag-picker-overlay').classList.add('open');
  document.getElementById('tag-picker-sheet').classList.add('open');
}

function closeTagPicker() {
  document.getElementById('tag-picker-overlay').classList.remove('open');
  document.getElementById('tag-picker-sheet').classList.remove('open');
  tagPickerContext = null;
}

function getTagStats() {
  const count = {}, lastUsed = {};
  posts.filter(p => p.status !== 'deleted').forEach(p => {
    (p.tags||[]).forEach(t => {
      count[t] = (count[t]||0) + 1;
      lastUsed[t] = Math.max(lastUsed[t]||0, p.updated||p.created||0);
    });
  });
  return { count, lastUsed };
}

function renderTagPicker() {
  const grid = document.getElementById('tag-picker-grid');
  if (!grid) return;
  const query = (document.getElementById('tag-picker-search')?.value||'').trim();
  const sort = document.getElementById('tag-sort-select')?.value || 'alpha';
  tagSortPref = sort;
  localStorage.setItem('ayb_tag_sort', sort);

  let tagList = getSortedTagList();
  if (query) tagList = tagList.filter(({tag}) => tag.includes(query));

  const activeTags = tagPickerContext === 'modal'
    ? (currentTags||[])
    : (windows[tagPickerContext]?.tagsList||[]);

  grid.innerHTML = '';
  if (tags.length === 0) {
    grid.innerHTML = '<span style="color:var(--text3);font-size:13px;">אין תגיות תואמות</span>';
    return;
  }

  tagList.forEach(({tag, count}) => {
    const isActive = activeTags.includes(tag);
    const btn = document.createElement('button');
    btn.className = 'drawer-tag-btn' + (isActive ? ' active' : '');
    btn.innerHTML = '#' + tag + (count ? ` <span style="opacity:0.6;font-size:11px;">${count}</span>` : '');
    btn.onclick = () => {
      if (isActive) { removeTagInContext(tag, tagPickerContext); }
      else { addTagInContext(tag, tagPickerContext); }
      renderTagPicker();
    };
    grid.appendChild(btn);
  });
}

function addTagInContext(tag, context) {
  if (context === 'modal') {
    if (!currentTags.includes(tag)) { currentTags.push(tag); renderTagChips(); }
  } else {
    if (!windows[context]) return;
    if (!windows[context].tagsList) windows[context].tagsList = [];
    if (!windows[context].tagsList.includes(tag)) {
      windows[context].tagsList.push(tag);
      renderWindowTags(context);
      markWindowChanged(context);
    }
  }
}

function removeTagInContext(tag, context) {
  if (context === 'modal') {
    currentTags = currentTags.filter(t => t !== tag);
    renderTagChips();
  } else {
    if (!windows[context]?.tagsList) return;
    windows[context].tagsList = windows[context].tagsList.filter(t => t !== tag);
    renderWindowTags(context);
    markWindowChanged(context);
  }
}

function handleNewTagInPicker(e) {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  if (!val || !tagPickerContext) return;
  addTagInContext(val, tagPickerContext);
  e.target.value = '';
  renderTagPicker();
}

// ========== TAG SUGGESTIONS ==========
function getAllExistingTags() {
  const all = new Set();
  posts.filter(p => p.status !== 'deleted').forEach(p => {
    let tags = p.tags || [];
    if (typeof tags === 'string') tags = tags.split(',').map(t => t.trim()).filter(Boolean);
    tags.forEach(t => { if (t) all.add(t.trim()); });
  });
  return [...all].sort();
}

function onTagInput(query, context) {
  context = String(context);
  const isModal = context === 'modal';
  const containerId = isModal ? 'modal-tag-suggestions' : 'tag-suggestions-' + context;
  const container = document.getElementById(containerId);
  if (!container) return;
  const activeTags = isModal ? (currentTags || []) : (windows[context]?.tagsList || []);
  const all = getAllExistingTags();
  const q = (query||'').trim();
  const filtered = q ? all.filter(t => t.includes(q)) : all;
  container.innerHTML = '';
  filtered.forEach(tag => {
    const isUsed = activeTags.includes(tag);
    const btn = document.createElement('button');
    btn.textContent = '#' + tag;
    btn.style.cssText = 'padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;font-family:Heebo,sans-serif;transition:all 0.15s;cursor:' + (isUsed ? 'default' : 'pointer') + ';border:1.5px solid ' + (isUsed ? 'var(--accent)' : 'var(--border)') + ';background:' + (isUsed ? 'rgba(108,99,255,0.15)' : 'var(--surface3)') + ';color:' + (isUsed ? 'var(--accent)' : 'var(--text3)') + ';';
    if (!isUsed) btn.onclick = () => pickTag(tag, context);
    container.appendChild(btn);
  });
}

function pickTag(tag, context) {
  if (context === 'modal') {
    if (!currentTags.includes(tag)) { currentTags.push(tag); renderTagChips(); }
    onTagInput('', 'modal');
    const input = document.getElementById('tag-input');
    if (input) { input.value = ''; input.focus(); }
  } else {
    if (!windows[context]) return;
    if (!windows[context].tagsList) windows[context].tagsList = [];
    if (!windows[context].tagsList.includes(tag)) {
      windows[context].tagsList.push(tag);
      renderWindowTags(context);
      markWindowChanged(context);
    }
    onTagInput('', context);
    const input = document.getElementById('wf_tag_input_' + context);
    if (input) { input.value = ''; input.focus(); }
  }
}

// ========== WINDOW TAGS ==========
function renderWindowTags(winId) {
  const area = document.getElementById('wf_tags_area_'+winId);
  const input = document.getElementById('wf_tag_input_'+winId);
  if (!area || !input) return;
  area.innerHTML = '';
  const tags = windows[winId]?.tagsList || [];
  tags.forEach((tag, i) => {
    const chip = document.createElement('span');
    chip.className = 'tag-input-chip';
    chip.innerHTML = `${tag}<button onclick="removeWindowTag('${winId}',${i})">×</button>`;
    area.appendChild(chip);
  });
  area.appendChild(input);
  // Show suggestions after render
  setTimeout(() => onTagInput('', winId), 50);
}

function handleWindowTagInput(e, winId) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(',','');
    if (!val) return;
    if (!windows[winId]) return;
    if (!windows[winId].tagsList) windows[winId].tagsList = [];
    if (!windows[winId].tagsList.includes(val)) {
      windows[winId].tagsList.push(val);
      renderWindowTags(winId);
      markWindowChanged(winId);
    }
    e.target.value = '';
  }
}

function removeWindowTag(winId, i) {
  if (!windows[winId]?.tagsList) return;
  windows[winId].tagsList.splice(i, 1);
  renderWindowTags(winId);
  markWindowChanged(winId);
}

// ========== FAVORITES ==========
let showFavOnly = false;

function toggleFavorite(postId) {
  const idx = posts.findIndex(p => p.id === postId);
  if (idx === -1) return;
  const tags = posts[idx].tags || [];
  if (tags.includes('⭐')) posts[idx].tags = tags.filter(t => t !== '⭐');
  else posts[idx].tags = ['⭐', ...tags];
  posts[idx].updated = Date.now();
  saveLocalCache();
  savePosts(posts[idx], 'savePost');
  render();
  showToast(posts[idx].tags.includes('⭐') ? '⭐ נוסף למועדפים' : 'הוסר ממועדפים');
}

function toggleFavFilter(btn) {
  showFavOnly = !showFavOnly;
  btn.classList.toggle('active', showFavOnly);
  render();
}

// ========== DUPLICATE ==========
function duplicatePost(postId, fromWinId) {
  const src = postId ? posts.find(p => p.id === postId) : null;
  const title = src ? src.title : (document.getElementById('wf_title_'+fromWinId)?.value||'');
  const body = src ? src.body : (document.getElementById('wf_body_'+fromWinId)?.value||'');
  const visual = src ? src.visual : (document.getElementById('wf_visual_'+fromWinId)?.value||'');
  const status = src ? src.status : (document.getElementById('wf_status_'+fromWinId)?.value||'idea');
  const tags = src ? [...(src.tags||[])] : [...(windows[fromWinId]?.tagsList||[])];
  const date = src ? (src.date||'') : (document.getElementById('wf_date_'+fromWinId)?.value||'');
  const newPost = { id: Date.now(), created: Date.now(), title: title + ' (עותק)', body, visual, status, tags, date };
  posts.unshift(newPost);
  render();
  savePosts(newPost, 'savePost');
  openWindow(newPost);
  showToast('⧉ הפוסט שוכפל!');
}

// Save everything before page close
window.addEventListener('beforeunload', () => {
  saveLocalCache();
});

// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/LinkdAsaf/sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW failed:', err));
  });
}

if (!checkAuth()) {
  // wait for login
} else {
  init().then(checkImport).then(() => {
    setTimeout(restoreDraftIfExists, 500);
    // Init sort selects
    const sort = localStorage.getItem('ayb_tag_sort') || 'alpha';
    ['sidebar-tag-sort','mobile-tag-sort','tag-sort-select'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = sort;
    });
  });
}
